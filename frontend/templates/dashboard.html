<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEEPFAKE GUARDIAN | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep-space: #030610;
            --neon-cyan: #00f2ff;
            --neon-cyan-dim: rgba(0, 242, 255, 0.2);
            --glass-bg: rgba(10, 15, 25, 0.6);
            --glass-border: rgba(0, 242, 255, 0.28);
            --text-muted: #9bb1c8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep-space);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .tech-grid {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -2;
            animation: moveGrid 6s linear infinite;
        }

        .tech-grid::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.04) 2px, transparent 2.5px);
            background-size: 80px 80px;
            animation: driftParticles 28s linear infinite;
            z-index: -1;
        }

        @keyframes driftParticles {
            0% { transform: rotate(0deg) translateY(0); }
            100% { transform: rotate(360deg) translateY(-50px); }
        }

        @keyframes moveGrid {
            0% { transform: translateY(0); }
            100% { transform: translateY(30px); }
        }

        .top-nav {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(3, 6, 16, 0.78);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .brand {
            color: var(--neon-cyan);
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 14px var(--neon-cyan-dim);
        }

        .nav-center {
            display: flex;
            gap: 0.8rem;
        }

        .nav-btn, .action-btn, .logout-btn, .tiny-btn {
            background: transparent;
            color: var(--neon-cyan);
            border: 1.5px solid var(--neon-cyan);
            border-radius: 8px;
            padding: 0.65rem 1rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            box-shadow: 0 0 12px rgba(0, 242, 255, 0.12), inset 0 0 10px rgba(0, 242, 255, 0.08);
            position: relative;
            overflow: hidden;
        }

        .nav-btn.active {
            box-shadow: 0 0 22px var(--neon-cyan), inset 0 0 14px rgba(0, 242, 255, 0.25);
            background: rgba(0, 242, 255, 0.08);
        }

        .nav-btn::after, .action-btn::after, .logout-btn::after, .tiny-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 70%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.65), transparent);
            transition: left 0.45s ease;
        }

        .nav-btn:hover, .action-btn:hover, .logout-btn:hover, .tiny-btn:hover {
            background: var(--neon-cyan);
            color: #030610;
            box-shadow: 0 0 26px var(--neon-cyan);
        }

        .nav-btn:hover::after, .action-btn:hover::after, .logout-btn:hover::after, .tiny-btn:hover::after {
            left: 130%;
        }

        .page {
            max-width: 1100px;
            margin: 1.5rem auto 2.5rem;
            padding: 0 1rem;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            backdrop-filter: blur(16px);
            padding: 1.2rem;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(0, 242, 255, 0.04);
            margin-bottom: 1rem;
        }

        .section-title {
            color: #fff;
            letter-spacing: 3px;
            margin-bottom: 1rem;
            text-transform: uppercase;
            text-shadow: 0 0 12px rgba(0, 242, 255, 0.28);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.9rem;
        }

        .input, .select, .readonly-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.42);
            border: 1px solid var(--glass-border);
            color: #fff;
            border-radius: 8px;
            padding: 0.75rem 0.8rem;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.2s ease;
        }

        .input:focus, .select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 12px var(--neon-cyan-dim);
        }

        .readonly-box {
            min-height: 44px;
            color: var(--text-muted);
        }

        .button-row {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 0.8rem;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            padding: 0.7rem 0.5rem;
            text-align: left;
            font-size: 0.92rem;
        }

        th {
            color: var(--neon-cyan);
            letter-spacing: 1px;
            font-weight: 700;
        }

        .tiny-btn {
            border-width: 1px;
            border-radius: 6px;
            padding: 0.35rem 0.55rem;
            margin-right: 0.4rem;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.12), inset 0 0 8px rgba(0, 242, 255, 0.08);
        }

        .download-btn {
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.22), inset 0 0 8px rgba(0, 242, 255, 0.15);
        }

        .error-neon {
            margin-top: 0.55rem;
            min-height: 1.2rem;
            color: #ff4d6d;
            text-shadow: 0 0 12px rgba(255, 77, 109, 0.6);
            font-size: 0.9rem;
        }

        .strength-wrap {
            margin-top: 0.5rem;
        }

        .strength-bar {
            height: 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.2s ease;
        }

        .strength-label {
            margin-top: 0.35rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 820px) {
            .top-nav {
                gap: 0.8rem;
                flex-direction: column;
            }
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="tech-grid"></div>

    <nav class="top-nav">
        <div class="brand">DEEPFAKE GUARDIAN</div>
        <div class="nav-center">
            <button id="navCipher" class="nav-btn active" type="button">🔐 CIPHER VAULT</button>
            <button id="navPassfort" class="nav-btn" type="button">🔑 PASSFORT</button>
            <a href="/download-auth-receipt" class="nav-btn">⬇ AUTH PDF</a>
        </div>
        <a href="/logout" class="logout-btn">LOGOUT</a>
    </nav>

    <main class="page">
        <section id="cipherSection" class="section active">
            <div class="glass-card">
                <h2 class="section-title">FILE ENCRYPTION VAULT</h2>
                <div class="grid-2">
                    <input class="input" type="file" id="vaultFile">
                    <select class="select" id="cipherSelect">
                        <option>Caesar</option>
                        <option>Vigenere</option>
                        <option>Stream</option>
                        <option>DES</option>
                        <option>AES-256</option>
                    </select>
                </div>
                <input class="input" type="password" id="fileSecurityKey" placeholder="Security Key (Required for encrypt/decrypt/download/delete)" style="margin-top: 0.8rem;">
                <div class="readonly-box" id="recommendationBox">AI Recommendation will appear here.</div>
                <div class="button-row">
                    <button class="action-btn" id="encryptSaveBtn" type="button">ENCRYPT &amp; SAVE</button>
                    <button class="action-btn" id="decryptFileBtn" type="button">DECRYPT FILE</button>
                </div>
                <div id="vaultError" class="error-neon"></div>
            </div>

            <div class="glass-card table-wrap">
                <h2 class="section-title">MY ENCRYPTED FILES</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Filename</th>
                            <th>Cipher Used</th>
                            <th>Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="vaultFilesBody"></tbody>
                </table>
            </div>
        </section>

        <section id="passfortSection" class="section">
            <div class="glass-card">
                <h2 class="section-title">PASSWORD VAULT</h2>
                <div class="grid-2">
                    <input id="siteName" class="input" type="text" placeholder="Site Name">
                    <input id="siteUsername" class="input" type="text" placeholder="Username">
                </div>
                <input id="sitePassword" class="input" type="password" placeholder="Password" style="margin-top: 0.8rem;">
                <input id="securityKey" class="input" type="password" placeholder="Security Key (Required for AES Encryption)" style="margin-top: 0.8rem;">

                <div class="strength-wrap">
                    <div class="strength-bar">
                        <div id="strengthFill" class="strength-fill"></div>
                    </div>
                    <div id="strengthLabel" class="strength-label">Strength: Weak</div>
                </div>

                <div class="button-row">
                    <button id="savePasswordBtn" class="action-btn" type="button">SAVE PASSWORD</button>
                </div>
                <div id="passfortError" class="error-neon"></div>
            </div>

            <div class="glass-card table-wrap">
                <h2 class="section-title">SAVED PASSWORDS</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Site</th>
                            <th>Username</th>
                            <th>Password</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="passwordTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const navCipher = document.getElementById('navCipher');
        const navPassfort = document.getElementById('navPassfort');
        const cipherSection = document.getElementById('cipherSection');
        const passfortSection = document.getElementById('passfortSection');
        const vaultFile = document.getElementById('vaultFile');
        const cipherSelect = document.getElementById('cipherSelect');
        const recommendationBox = document.getElementById('recommendationBox');
        const fileSecurityKey = document.getElementById('fileSecurityKey');
        const encryptSaveBtn = document.getElementById('encryptSaveBtn');
        const decryptFileBtn = document.getElementById('decryptFileBtn');
        const vaultError = document.getElementById('vaultError');
        const vaultFilesBody = document.getElementById('vaultFilesBody');

        function setActiveSection(target) {
            const showCipher = target === 'cipher';
            cipherSection.classList.toggle('active', showCipher);
            passfortSection.classList.toggle('active', !showCipher);
            navCipher.classList.toggle('active', showCipher);
            navPassfort.classList.toggle('active', !showCipher);
        }

        navCipher.addEventListener('click', () => setActiveSection('cipher'));
        navPassfort.addEventListener('click', () => setActiveSection('passfort'));

        function showVaultError(message) {
            vaultError.textContent = message || '';
        }

        async function updateRecommendation() {
            if (!vaultFile.files.length) {
                recommendationBox.textContent = 'AI Recommendation will appear here.';
                return;
            }
            const file = vaultFile.files[0];
            const form = new FormData();
            form.append('filename', file.name);
            form.append('filesize', String(file.size));
            const response = await fetch('/recommend', { method: 'POST', body: form });
            const data = await response.json();
            if (!response.ok) {
                recommendationBox.textContent = 'Recommendation unavailable.';
                return;
            }
            const cipherName = data.cipher && data.cipher.cipher ? data.cipher.cipher : 'AES-256';
            const reason = data.cipher && data.cipher.reason ? data.cipher.reason : 'Safe default selection.';
            recommendationBox.textContent = `${cipherName} - ${reason}`;
        }

        function formatDate(ts) {
            const d = new Date((ts || 0) * 1000);
            return isNaN(d.getTime()) ? '-' : d.toLocaleString();
        }

        async function loadVaultFiles() {
            const response = await fetch('/my-files');
            const data = await response.json();
            vaultFilesBody.innerHTML = '';
            if (!response.ok || !Array.isArray(data)) {
                return;
            }
            data.forEach((item) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.original_name}</td>
                    <td>${item.cipher_name}</td>
                    <td>${formatDate(item.timestamp)}</td>
                    <td>
                        <button class="tiny-btn enc-download-btn" type="button" data-file="${item.stored_name}">Download Encrypted</button>
                        <button class="tiny-btn dec-download-btn" type="button" data-file="${item.stored_name}" data-cipher="${item.cipher_name}">Download Decrypted</button>
                        <button class="tiny-btn delete-file-btn" type="button" data-file="${item.stored_name}">Delete</button>
                    </td>
                `;
                vaultFilesBody.appendChild(row);
            });
            bindVaultActions();
        }

        function submitBlobDownload(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

        function getFilenameFromResponse(response, fallbackName) {
            const disposition = response.headers.get('Content-Disposition') || '';
            const match = disposition.match(/filename="?([^"]+)"?/i);
            if (match && match[1]) {
                return match[1];
            }
            return fallbackName;
        }

        function bindVaultActions() {
            document.querySelectorAll('.enc-download-btn').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    showVaultError('');
                    const key = window.prompt('Enter Security Key to download encrypted file');
                    if (!key) return;
                    const form = new FormData();
                    form.append('filename', btn.dataset.file);
                    form.append('key', key);
                    const response = await fetch('/download-encrypted-file', { method: 'POST', body: form });
                    if (!response.ok) {
                        const data = await response.json();
                        showVaultError(data.error || 'Download failed');
                        return;
                    }
                    const blob = await response.blob();
                    submitBlobDownload(blob, `${btn.dataset.file}`);
                });
            });

            document.querySelectorAll('.dec-download-btn').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    showVaultError('');
                    const key = window.prompt('Enter Security Key to decrypt/download file');
                    if (!key) return;
                    const form = new FormData();
                    form.append('filename', btn.dataset.file);
                    form.append('cipher_name', btn.dataset.cipher);
                    form.append('key', key);
                    const response = await fetch('/decrypt-file', { method: 'POST', body: form });
                    if (!response.ok) {
                        const data = await response.json();
                        showVaultError(data.error || 'Decrypt download failed');
                        return;
                    }
                    const blob = await response.blob();
                    submitBlobDownload(blob, getFilenameFromResponse(response, `decrypted_${btn.dataset.file}`));
                });
            });

            document.querySelectorAll('.delete-file-btn').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    showVaultError('');
                    const key = window.prompt('Enter Security Key to delete this file');
                    if (!key) return;
                    const form = new FormData();
                    form.append('filename', btn.dataset.file);
                    form.append('key', key);
                    const response = await fetch('/delete-file', { method: 'POST', body: form });
                    const data = await response.json();
                    if (!response.ok) {
                        showVaultError(data.error || 'Delete failed');
                        return;
                    }
                    loadVaultFiles();
                });
            });
        }

        vaultFile.addEventListener('change', updateRecommendation);
        cipherSelect.addEventListener('change', updateRecommendation);

        encryptSaveBtn.addEventListener('click', async () => {
            showVaultError('');
            if (!vaultFile.files.length) {
                showVaultError('Please select a file first.');
                return;
            }
            if (!fileSecurityKey.value) {
                showVaultError('Security key is required.');
                return;
            }
            const form = new FormData();
            form.append('file', vaultFile.files[0]);
            form.append('cipher_name', cipherSelect.value);
            form.append('key', fileSecurityKey.value);
            const response = await fetch('/encrypt-file', { method: 'POST', body: form });
            const data = await response.json();
            if (!response.ok) {
                showVaultError(data.error || 'Encryption failed');
                return;
            }
            loadVaultFiles();
        });

        decryptFileBtn.addEventListener('click', async () => {
            showVaultError('');
            const selectedRow = vaultFilesBody.querySelector('tr');
            if (!selectedRow) {
                showVaultError('No encrypted files available.');
                return;
            }
            if (!fileSecurityKey.value) {
                showVaultError('Security key is required.');
                return;
            }
            const decBtn = selectedRow.querySelector('.dec-download-btn');
            const form = new FormData();
            form.append('filename', decBtn.dataset.file);
            form.append('cipher_name', decBtn.dataset.cipher);
            form.append('key', fileSecurityKey.value);
            const response = await fetch('/decrypt-file', { method: 'POST', body: form });
            if (!response.ok) {
                const data = await response.json();
                showVaultError(data.error || 'Decrypt failed');
                return;
            }
            const blob = await response.blob();
            submitBlobDownload(blob, getFilenameFromResponse(response, `decrypted_${decBtn.dataset.file}`));
        });

        const sitePassword = document.getElementById('sitePassword');
        const securityKey = document.getElementById('securityKey');
        const savePasswordBtn = document.getElementById('savePasswordBtn');
        const strengthFill = document.getElementById('strengthFill');
        const strengthLabel = document.getElementById('strengthLabel');
        const passfortError = document.getElementById('passfortError');
        const passwordTableBody = document.getElementById('passwordTableBody');
        const siteName = document.getElementById('siteName');
        const siteUsername = document.getElementById('siteUsername');

        function scorePassword(value) {
            let score = 0;
            if (value.length >= 8) score++;
            if (/[A-Z]/.test(value)) score++;
            if (/[a-z]/.test(value)) score++;
            if (/\d/.test(value)) score++;
            if (/[^A-Za-z0-9]/.test(value)) score++;
            return score;
        }

        function applyStrength(score) {
            let label = 'Weak';
            let color = '#ff3b3b';
            let width = '25%';

            if (score === 3) {
                label = 'Medium';
                color = '#ff9f1a';
                width = '50%';
            } else if (score === 4) {
                label = 'Strong';
                color = '#2ecc71';
                width = '75%';
            } else if (score >= 5) {
                label = 'Very Strong';
                color = '#00ff99';
                width = '100%';
            }

            strengthFill.style.width = width;
            strengthFill.style.background = color;
            strengthLabel.textContent = `Strength: ${label}`;
            strengthLabel.style.color = color;
        }

        sitePassword.addEventListener('input', () => {
            applyStrength(scorePassword(sitePassword.value));
        });

        function showError(message) {
            passfortError.textContent = message || '';
        }

        async function loadPasswords() {
            showError('');
            const response = await fetch('/get-passwords');
            const data = await response.json();
            passwordTableBody.innerHTML = '';
            if (!response.ok || !Array.isArray(data)) {
                showError((data && data.error) || 'Failed to load passwords');
                return;
            }

            data.forEach((item) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.site_name}</td>
                    <td>${item.username}</td>
                    <td data-password-cell="${item.id}">****</td>
                    <td>
                        <button class="tiny-btn show-btn" type="button" data-id="${item.id}">Show</button>
                        <button class="tiny-btn delete-btn" type="button" data-id="${item.id}">Delete</button>
                        <button class="tiny-btn download-btn enc-pdf-btn" type="button" data-id="${item.id}">DOWNLOAD ENCRYPTED PDF</button>
                        <button class="tiny-btn download-btn dec-pdf-btn" type="button" data-id="${item.id}">DOWNLOAD DECRYPTED PDF</button>
                    </td>
                `;
                passwordTableBody.appendChild(row);
            });

            bindTableActions();
        }

        function bindTableActions() {
            document.querySelectorAll('.show-btn').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    showError('');
                    const id = btn.dataset.id;
                    const cell = document.querySelector(`[data-password-cell="${id}"]`);
                    if (btn.textContent === 'Hide') {
                        cell.textContent = '****';
                        btn.textContent = 'Show';
                        return;
                    }

                    const key = window.prompt('Enter Security Key to decrypt password');
                    if (!key) return;
                    const form = new FormData();
                    form.append('password_id', id);
                    form.append('security_key', key);
                    const response = await fetch('/decrypt-password', { method: 'POST', body: form });
                    const data = await response.json();
                    if (!response.ok) {
                        showError(data.error || 'Decryption Failed');
                        return;
                    }
                    cell.textContent = data.password;
                    btn.textContent = 'Hide';
                });
            });

            document.querySelectorAll('.delete-btn').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    showError('');
                    const id = btn.dataset.id;
                    const key = window.prompt('Enter Security Key to delete this password');
                    if (!key) return;
                    const form = new FormData();
                    form.append('password_id', id);
                    form.append('security_key', key);
                    const response = await fetch('/delete-password', { method: 'POST', body: form });
                    const data = await response.json();
                    if (!response.ok) {
                        showError(data.error || 'Delete failed');
                        return;
                    }
                    loadPasswords();
                });
            });

            document.querySelectorAll('.enc-pdf-btn').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.id;
                    window.location.href = `/download-password-receipt?password_id=${encodeURIComponent(id)}`;
                });
            });

            document.querySelectorAll('.dec-pdf-btn').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    showError('');
                    const id = btn.dataset.id;
                    const key = window.prompt('Enter Security Key to download decrypted PDF');
                    if (!key) return;
                    const form = new FormData();
                    form.append('password_id', id);
                    form.append('security_key', key);
                    const response = await fetch('/download-password-receipt-decrypted', { method: 'POST', body: form });
                    if (!response.ok) {
                        let err = 'Download failed';
                        try {
                            const payload = await response.json();
                            err = payload.error || err;
                        } catch (_) {}
                        showError(err);
                        return;
                    }
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `decrypted_receipt_${id}.pdf`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                });
            });
        }

        savePasswordBtn.addEventListener('click', async () => {
            showError('');
            const form = new FormData();
            form.append('site_name', siteName.value.trim());
            form.append('username', siteUsername.value.trim());
            form.append('password', sitePassword.value);
            form.append('security_key', securityKey.value);

            const response = await fetch('/save-password', { method: 'POST', body: form });
            const data = await response.json();
            if (!response.ok) {
                showError(data.error || 'Save failed');
                return;
            }

            siteName.value = '';
            siteUsername.value = '';
            sitePassword.value = '';
            securityKey.value = '';
            applyStrength(0);
            loadPasswords();
        });

        loadVaultFiles();
        loadPasswords();
    </script>
</body>
</html>
